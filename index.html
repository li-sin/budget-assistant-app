<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1C1C1E">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BudgetAssistant</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div id="app">

    <!-- 登入畫面 -->
    <div id="screen-login" class="screen">
      <div class="login-container">
        <h1>💰 BudgetAssistant</h1>
        <p>Sin &amp; Bear 共同記帳</p>
        <button id="btn-login" class="btn-primary">使用 Google 登入</button>
        <p id="login-error" class="login-error" hidden></p>
        <p id="login-version" class="settings-version"></p>
        <button id="btn-clear-cache" class="btn-clear-cache">清除快取</button>
      </div>
    </div>

    <!-- 主畫面（登入後顯示） -->
    <div id="screen-app" class="screen hidden">

      <main id="content">
        <div id="tab-home"    class="tab-content"></div>
        <div id="tab-ledger"  class="tab-content hidden"></div>
        <div id="tab-stats"   class="tab-content hidden"></div>
        <div id="tab-pending" class="tab-content hidden"></div>
      </main>

      <nav id="bottom-nav">
        <button class="nav-item active" data-tab="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">首頁</span>
        </button>
        <button class="nav-item" data-tab="ledger">
          <span class="nav-icon">📋</span>
          <span class="nav-label">明細</span>
        </button>
        <button class="nav-item" data-tab="stats">
          <span class="nav-icon">📊</span>
          <span class="nav-label">統計</span>
        </button>
        <button class="nav-item" data-tab="pending">
          <span class="nav-icon">🔔</span>
          <span class="nav-label">待處理</span>
        </button>
      </nav>

      <!-- 設定 Modal -->
      <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-sheet" id="settings-sheet"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/router.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/gmail.js"></script>
  <script src="js/home.js"></script>
  <script src="js/ledger.js"></script>
  <script src="js/scan.js"></script>
  <script src="js/add.js"></script>
  <script src="js/pending.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
